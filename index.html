<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ตะกร้างาน — Work Flow Dashboard</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2F5D50">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ตะกร้างาน">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@400;500;600;700&family=IBM+Plex+Sans+Thai:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --canvas:#E9EDE7;        /* pale sage paper */
    --surface:#FBFCFA;
    --surface-2:#F2F5F0;
    --ink:#1C2721;           /* forest ink */
    --ink-soft:#5A665F;
    --muted:#8B968E;
    --line:#DCE2D8;
    --green:#2F5D50;         /* structural */
    --green-soft:#EAF1EC;
    --amber:#DE7F27;         /* SIGNATURE: next action */
    --amber-soft:#FBEBD8;
    --red:#C0392B;           /* overdue */
    --rose:#C4688B;          /* CuteBoy */
    --blue:#3E7CB1;          /* 7SOC */
    --grey:#94A099;          /* อื่นๆ */
    --radius:14px;
    --shadow:0 1px 2px rgba(28,39,33,.05), 0 8px 24px rgba(28,39,33,.06);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  html,body{overflow-x:hidden}
  body{
    font-family:"IBM Plex Sans Thai",system-ui,sans-serif;
    background:var(--canvas);
    color:var(--ink);
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
    padding:20px;
  }
  .label{font-family:"IBM Plex Mono",monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-weight:500}
  .app{max-width:1240px;margin:0 auto}

  /* ---------- HEADER ---------- */
  .pageheader{padding:2px 4px 14px}
  .pageheader h1{font-family:"Anuphan",sans-serif;font-weight:700;font-size:26px;letter-spacing:-.01em;color:var(--ink)}

  /* ---------- CAPTURE CARD ---------- */
  .capture-card{
    display:flex;flex-direction:column;gap:10px;
    background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
    padding:14px;box-shadow:var(--shadow);margin-bottom:14px;
  }
  .capture-card input{
    width:100%;box-sizing:border-box;border:1px solid var(--line);background:var(--surface-2);
    border-radius:10px;padding:12px 14px;font-family:inherit;font-size:15px;color:var(--ink);outline:none;
  }
  .capture-card input::placeholder{color:var(--muted)}
  .capture-card input:focus{border-color:var(--green)}
  .capture-row{display:flex;gap:8px}
  .capture-row select{
    flex:1;min-width:0;border:1px solid var(--line);background:var(--surface-2);border-radius:10px;
    padding:0 10px;font-family:inherit;font-size:14px;color:var(--ink-soft);outline:none;
  }
  .btn{font-family:inherit;border:none;cursor:pointer;border-radius:8px;font-weight:600;font-size:14px;transition:transform .08s ease, background .15s ease}
  .btn:active{transform:translateY(1px)}
  .btn-drop{background:var(--green);color:#fff;padding:9px 16px;flex:1.3;border-radius:10px}
  .btn-drop:hover{background:#264b41}

  /* ---------- STATS BAR ---------- */
  .stats{
    display:flex;justify-content:space-between;gap:10px;
    background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
    padding:14px 20px;box-shadow:var(--shadow);margin-bottom:18px;
  }
  .stat{text-align:center;flex:1}
  .stat b{font-family:"IBM Plex Mono",monospace;font-size:22px;font-weight:500;display:block;line-height:1}
  .stat.inbox b{color:var(--amber)}
  .stat span{font-size:11px;color:var(--muted)}

  /* ---------- GRID ---------- */
  .grid{display:grid;grid-template-columns:minmax(0,1.15fr) minmax(0,1fr);gap:18px}
  .col{display:flex;flex-direction:column;gap:18px;min-width:0}

  .zone{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
  .zone-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 10px}
  .zone-head h2{font-family:"Anuphan",sans-serif;font-size:16px;font-weight:600;display:flex;align-items:center;gap:8px}
  .count-pill{font-family:"IBM Plex Mono",monospace;font-size:12px;background:var(--surface-2);border:1px solid var(--line);color:var(--ink-soft);padding:2px 9px;border-radius:20px}

  /* the physical "basket" feel for inbox */
  .zone-inbox{border-left:3px solid var(--amber)}
  .zone-inbox .zone-head h2 svg{color:var(--amber)}
  .tray{padding:4px 12px 14px;display:flex;flex-direction:column;gap:9px;min-height:60px}

  /* ---------- CARDS ---------- */
  .card{background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:12px 13px;cursor:pointer;
    transition:border-color .15s, box-shadow .15s, transform .08s;position:relative}
  .card:hover{border-color:#c4cebe;box-shadow:0 4px 14px rgba(28,39,33,.07)}
  .card:focus-visible{outline:2px solid var(--green);outline-offset:2px}
  .card.selected{border-color:var(--green);box-shadow:0 0 0 1px var(--green)}
  .card-top{display:flex;align-items:center;gap:8px;margin-bottom:6px}
  .src{font-family:"IBM Plex Mono",monospace;font-size:10px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;padding:2px 7px;border-radius:6px;color:#fff}
  .src.CuteBoy{background:var(--rose)} .src\.7SOC{background:var(--blue)}
  .src.cuteboy{background:var(--rose)} .src.soc{background:var(--blue)} .src.other{background:var(--grey)}
  .card h3{font-size:14.5px;font-weight:500;line-height:1.35}
  .card-meta{display:flex;align-items:center;gap:10px;margin-top:9px}
  .mini{font-size:11.5px;color:var(--muted);display:flex;align-items:center;gap:4px}
  .mini svg{width:13px;height:13px}
  .prog-mini{flex:1;height:5px;background:var(--surface-2);border-radius:5px;overflow:hidden;max-width:120px}
  .prog-mini i{display:block;height:100%;background:var(--green);border-radius:5px;transition:width .3s}

  .tray-btn{margin-left:auto;background:var(--green-soft);color:var(--green);border:none;cursor:pointer;
    font-family:inherit;font-weight:600;font-size:12px;padding:4px 10px;border-radius:7px}
  .tray-btn:hover{background:#dbe8de}

  .active-list{padding:4px 12px 14px;display:flex;flex-direction:column;gap:9px}
  .empty{padding:22px 16px;text-align:center;color:var(--muted);font-size:13px}

  /* ---------- PROJECT TAG ---------- */
  .tag-pill{font-size:11px;font-weight:500;color:var(--ink-soft);background:var(--surface-2);
    border:1px solid var(--line);padding:1px 8px;border-radius:20px;margin-left:2px}
  .filterbar{display:flex;align-items:center;gap:7px;flex-wrap:wrap;padding:2px 2px 14px}
  .filterbar .label{margin-right:2px}
  .chip{font-family:inherit;font-size:12.5px;font-weight:500;color:var(--ink-soft);background:var(--surface);
    border:1px solid var(--line);padding:5px 12px;border-radius:20px;cursor:pointer;transition:.15s}
  .chip:hover{border-color:#c4cebe}
  .chip.on{background:var(--green);border-color:var(--green);color:#fff}

  /* ---------- DETAIL PANEL ---------- */
  .detail{position:sticky;top:20px}
  .detail-inner{padding:18px 20px 22px}
  .detail .src{margin-bottom:12px;display:inline-block}
  .detail h2{font-family:"Anuphan",sans-serif;font-size:21px;font-weight:600;line-height:1.25;margin-bottom:16px}

  /* SIGNATURE — next action box */
  .next{background:var(--amber-soft);border:1px solid #f0d4b0;border-radius:12px;padding:13px 15px;margin-bottom:18px;position:relative;overflow:hidden}
  .next::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--amber)}
  .next .label{color:#b96718}
  .next p{font-size:16px;font-weight:600;margin-top:5px;color:#7a4212}
  .next small{display:block;margin-top:6px;font-size:12px;color:#a9744a}

  .ring-row{display:flex;align-items:center;gap:16px;margin-bottom:16px}
  .ring{width:56px;height:56px;flex:none}
  .ring-row div b{font-family:"IBM Plex Mono",monospace;font-size:15px;font-weight:500}
  .ring-row div span{display:block;font-size:12px;color:var(--muted)}

  .sub-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
  .checklist{display:flex;flex-direction:column;gap:2px;margin-bottom:12px}
  .chk{display:flex;align-items:flex-start;gap:10px;padding:8px 6px;border-radius:8px;cursor:pointer}
  .chk:hover{background:var(--surface-2)}
  .box{width:19px;height:19px;flex:none;border:2px solid #c2ccbf;border-radius:6px;margin-top:1px;display:grid;place-items:center;transition:.15s}
  .chk.done .box{background:var(--green);border-color:var(--green)}
  .chk.done .box svg{opacity:1}
  .box svg{width:11px;height:11px;opacity:0;color:#fff}
  .chk .txt{font-size:14px}
  .chk.done .txt{color:var(--muted);text-decoration:line-through}

  .addsub{display:flex;gap:7px;margin-bottom:18px}
  .addsub input{flex:1;border:1px solid var(--line);background:var(--surface-2);border-radius:8px;padding:8px 11px;font-family:inherit;font-size:13.5px;outline:none}
  .addsub input:focus{border-color:var(--green)}
  .addsub button{background:var(--surface-2);border:1px solid var(--line);color:var(--ink-soft);border-radius:8px;padding:0 12px;cursor:pointer;font-size:18px;font-family:inherit}
  .addsub button:hover{background:#e6ebe3}

  .meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .meta-cell{background:var(--surface-2);border-radius:9px;padding:9px 12px;position:relative}
  .meta-cell .label{font-size:9.5px}
  .meta-cell p{font-size:13.5px;margin-top:3px;font-weight:500}
  .meta-cell.warn p{color:var(--amber)}

  .field-row{display:flex;justify-content:space-between;align-items:center}
  .editbtn{background:none;border:none;cursor:pointer;color:var(--ink-soft);font-size:11px;font-family:inherit;
    padding:1px 7px;border-radius:6px;font-weight:500}
  .editbtn:hover{background:var(--surface);color:var(--ink)}
  .next .editbtn{color:#a9744a}
  .next .editbtn:hover{background:#f6dcb8}
  .editrow{display:flex;gap:6px;margin-top:5px}
  .editrow input{flex:1;border:1px solid var(--line);border-radius:7px;padding:6px 9px;font-family:inherit;font-size:13px;outline:none;background:var(--surface)}
  .editrow input:focus{border-color:var(--green)}
  .editrow button{background:var(--green);color:#fff;border:none;border-radius:7px;padding:0 12px;font-family:inherit;font-size:13px;cursor:pointer;font-weight:600}

  .done-card{opacity:.55;cursor:pointer}
  .done-card:hover{opacity:.8}
  .done-card h3{text-decoration:line-through}

  .donebanner{display:flex;justify-content:space-between;align-items:center;
    background:var(--green-soft);border:1px solid #cde3d4;border-radius:10px;
    padding:9px 13px;margin-bottom:14px;font-size:13px;font-weight:600;color:var(--green)}
  .donebanner .editbtn{color:var(--green);background:var(--surface)}
  .donebanner .editbtn:hover{background:#fff}

  .overdue{color:var(--red) !important}
  .overdue-mini{color:var(--red);font-weight:600}

  .detail-empty{padding:60px 24px;text-align:center;color:var(--muted)}
  .detail-empty svg{width:44px;height:44px;opacity:.35;margin-bottom:12px}

  .flowhint{font-size:11.5px;color:var(--ink-soft);background:var(--green-soft);border-radius:8px;padding:7px 11px;margin-top:14px;line-height:1.4}
  .flowhint b{color:var(--green)}

  @media(max-width:880px){
    .grid{grid-template-columns:1fr}
    .detail{position:static}
    .card-top{flex-wrap:wrap}
  }
  @media(prefers-reduced-motion:reduce){*{transition:none!important;scroll-behavior:auto}}
</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <div class="pageheader">
    <h1>ตะกร้างาน</h1>
  </div>

  <!-- CAPTURE -->
  <div class="capture-card">
    <input id="capIn" type="text" placeholder="โยนงานที่เพิ่งเข้ามาลงตะกร้า… (แค่พิมพ์หัวข้อ ไม่ต้องคิดเยอะ)">
    <input id="capTag" type="text" list="tagList" placeholder="โปรเจกต์ (ถ้ามี)">
    <datalist id="tagList"></datalist>
    <div class="capture-row">
      <select id="capSrc">
        <option value="cuteboy">CuteBoy</option>
        <option value="soc">7SOC</option>
        <option value="other">อื่นๆ</option>
      </select>
      <button class="btn btn-drop" onclick="capture()">โยนเข้าตะกร้า</button>
    </div>
  </div>

  <!-- STATS -->
  <div class="stats">
    <div class="stat inbox"><b id="sInbox">0</b><span>ในตะกร้า</span></div>
    <div class="stat"><b id="sActive">0</b><span>กำลังทำ</span></div>
    <div class="stat"><b id="sDone">0</b><span>เสร็จวันนี้</span></div>
  </div>

  <!-- FILTER -->
  <div class="filterbar" id="filterbar"></div>

  <!-- GRID -->
  <div class="grid">
    <!-- LEFT -->
    <div class="col">
      <!-- INBOX -->
      <section class="zone zone-inbox">
        <div class="zone-head">
          <h2>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-6l-2 3h-4l-2-3H2"/><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg>
            ตะกร้างาน
          </h2>
          <span class="count-pill" id="inboxCount">0</span>
        </div>
        <div class="tray" id="tray"></div>
      </section>

      <!-- ACTIVE -->
      <section class="zone">
        <div class="zone-head">
          <h2>
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v4"/><path d="m16.2 7.8 2.9-2.9"/><path d="M18 12h4"/><path d="m16.2 16.2 2.9 2.9"/><path d="M12 18v4"/><path d="m4.9 19.1 2.9-2.9"/><path d="M2 12h4"/><path d="m4.9 4.9 2.9 2.9"/></svg>
            กำลังทำ
          </h2>
          <span class="count-pill" id="activeCount">0</span>
        </div>
        <div class="active-list" id="activeList"></div>
      </section>

      <!-- DONE -->
      <section class="zone">
        <div class="zone-head">
          <h2>เสร็จสิ้น</h2>
          <span class="count-pill" id="doneCount">0</span>
        </div>
        <div class="active-list" id="doneList"></div>
      </section>
    </div>

    <!-- RIGHT: DETAIL -->
    <aside class="col">
      <section class="zone detail">
        <div id="detail"></div>
      </section>
    </aside>
  </div>
</div>

<script>
/* ---------- DATA (in-memory demo) ---------- */
const SRC = {
  cuteboy:{name:"CuteBoy",cls:"cuteboy"},
  soc:{name:"7SOC",cls:"soc"},
  other:{name:"อื่นๆ",cls:"other"}
};
const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbyGKv4VrchO8eHWNNvwjAj1_Pn8_fPgVVr72ECGs4seIDdY_Ji4bwYL6wVqpIb4ZAv1LA/exec";

let tasks = [];
let selectedId = null;
let activeFilter = null; // null = ทั้งหมด
let loaded = false;

// แปลงชื่อ field จาก backend (project_tag, next_action, subtasks) ให้ตรงกับที่หน้าเว็บนี้ใช้ (tag, next, subs)
function mapFromBackend(list){
  return list.map(x=>({
    id: x.id, src: x.src, tag: x.project_tag||"", title: x.title, state: x.state,
    next: x.next_action||"", deadline: x.deadline||"", note: x.note||"",
    subs: x.subtasks||[], updated_at: x.updated_at||"", created_at: x.created_at||""
  }));
}

async function loadTasks(){
  try{
    const res = await fetch(WEBAPP_URL);
    tasks = mapFromBackend(await res.json());
  }catch(err){
    console.error(err);
  }
  loaded = true; render();
}

// เรียก backend ทุกครั้งที่มีการเปลี่ยนแปลง แล้วเอา list ที่ได้กลับมา (ล่าสุดจริง) มาแทนของเดิมทั้งหมด
async function postAction(action, data){
  // จำค่าที่พิมพ์ค้างอยู่ในช่อง "เพิ่มขั้นตอน" ไว้ก่อน เผื่อ backend ตอบกลับช้าแล้วมาล้าง render ทับ
  const subInEl = document.getElementById("subIn");
  const preserved = subInEl ? {val: subInEl.value, focused: document.activeElement === subInEl} : null;

  try{
    const res = await fetch(WEBAPP_URL, {
      method:"POST",
      headers:{"Content-Type":"text/plain;charset=utf-8"}, // เลี่ยง CORS preflight — Apps Script ไม่รองรับ
      body: JSON.stringify({action, data})
    });
    tasks = mapFromBackend(await res.json());
  }catch(err){
    console.error(err);
    alert("บันทึกไม่สำเร็จ เช็คอินเทอร์เน็ต แล้วลองใหม่");
  }
  render();

  if(preserved){
    const ni = document.getElementById("subIn");
    if(ni){
      ni.value = preserved.val;
      if(preserved.focused){ ni.focus(); const len = ni.value.length; ni.setSelectionRange(len, len); }
    }
  }
}

/* ---------- ICONS ---------- */
const ic = {
  check:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>',
  list:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>',
  clock:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 14"/></svg>',
};

/* ---------- RENDER ---------- */
function progress(t){ if(!t.subs||!t.subs.length) return 0; return Math.round(t.subs.filter(s=>s.done).length/t.subs.length*100); }
function isToday(iso){
  if(!iso) return false;
  const d = new Date(iso), n = new Date();
  return d.getFullYear()===n.getFullYear() && d.getMonth()===n.getMonth() && d.getDate()===n.getDate();
}
// เดดไลน์เก็บเป็น "YYYY-MM-DD" ปกติ แต่เผื่อ Sheets แปลงเป็น Date แล้วได้ ISO เต็มรูปแบบกลับมา ตัดเอาแค่ 10 ตัวแรกก่อนเสมอ
function formatDeadline(dstr){
  if(!dstr) return "";
  const datePart = String(dstr).slice(0,10);
  const d = new Date(datePart+"T00:00:00");
  if(isNaN(d)) return dstr; // เผื่อค่าเก่าที่เป็น free text ก่อนเปลี่ยนมาใช้ date picker
  const dd = String(d.getDate()).padStart(2,"0");
  const mm = String(d.getMonth()+1).padStart(2,"0");
  return `${dd}-${mm}-${d.getFullYear()}`;
}
function isOverdue(dstr){
  if(!dstr) return false;
  const datePart = String(dstr).slice(0,10);
  const d = new Date(datePart+"T00:00:00");
  if(isNaN(d)) return false;
  const today = new Date(); today.setHours(0,0,0,0);
  return d < today;
}

function render(){
  if(!loaded){
    tray.innerHTML = `<div class="empty">กำลังโหลดข้อมูล…</div>`;
    activeList.innerHTML = ""; doneList.innerHTML = "";
    filterbar.innerHTML = "";
    inboxCount.textContent = activeCount.textContent = doneCount.textContent = sInbox.textContent = sActive.textContent = sDone.textContent = "…";
    renderDetail();
    return;
  }

  // datalist suggestions — เก็บ tag ทั้งหมดที่เคยมี ให้พิมพ์ชื่อโปรเจกต์ซ้ำได้แม่นยำ
  const allTags = [...new Set(tasks.map(t=>t.tag).filter(Boolean))];
  tagList.innerHTML = allTags.map(tg=>`<option value="${esc(tg)}">`).join("");

  // filter chips — โชว์เฉพาะโปรเจกต์ที่ยังมีงานค้าง (ไม่ใช่ทุก tag ที่เคยมี) โปรเจกต์ที่เสร็จหมดแล้วให้หายไปเอง
  const pendingTags = [...new Set(tasks.filter(t=>t.state!=="done" && t.tag).map(t=>t.tag))];
  filterbar.innerHTML = `<span class="label">โปรเจกต์:</span>
    <button class="chip ${activeFilter===null?'on':''}" onclick="setFilter(null)">ทั้งหมด</button>
    ${pendingTags.map(tg=>`<button class="chip ${activeFilter===tg?'on':''}" onclick="setFilter('${esc(tg)}')">${esc(tg)}</button>`).join("")}`;

  const scoped = activeFilter ? tasks.filter(t=>t.tag===activeFilter) : tasks;
  const inbox = scoped.filter(t=>t.state==="inbox");
  const active = scoped.filter(t=>t.state==="active");
  const done = scoped.filter(t=>t.state==="done");

  // stats (always reflect the full set, not the filtered view)
  sInbox.textContent = tasks.filter(t=>t.state==="inbox").length;
  sActive.textContent = tasks.filter(t=>t.state==="active").length;
  sDone.textContent = tasks.filter(t=>t.state==="done" && isToday(t.updated_at)).length;
  inboxCount.textContent = inbox.length;
  activeCount.textContent = active.length;
  doneCount.textContent = done.length;

  // inbox tray
  tray.innerHTML = inbox.length ? inbox.map(t=>{
    const s = SRC[t.src];
    return `<div class="card" tabindex="0" onclick="select('${t.id}')" onkeydown="if(event.key==='Enter')select('${t.id}')">
      <div class="card-top"><span class="src ${s.cls}">${s.name}</span>${t.tag?`<span class="tag-pill">${esc(t.tag)}</span>`:''}</div>
      <h3>${esc(t.title)}</h3>
      <div class="card-meta">
        <span class="mini">ยังไม่แตกงาน</span>
        <button class="tray-btn" onclick="event.stopPropagation();pullIn('${t.id}')">ดึงเข้าทำ →</button>
      </div>
    </div>`;
  }).join("") : `<div class="empty">${activeFilter?'ไม่มีงานในตะกร้าสำหรับโปรเจกต์นี้':'ตะกร้าว่าง — งานเข้ามาใหม่จะมากองตรงนี้ก่อน'}</div>`;

  // active list
  activeList.innerHTML = active.length ? active.map(t=>{
    const s = SRC[t.src], p = progress(t);
    return `<div class="card ${t.id===selectedId?'selected':''}" tabindex="0" onclick="select('${t.id}')" onkeydown="if(event.key==='Enter')select('${t.id}')">
      <div class="card-top"><span class="src ${s.cls}">${s.name}</span>${t.tag?`<span class="tag-pill">${esc(t.tag)}</span>`:''}
        ${t.deadline?`<span class="mini ${isOverdue(t.deadline)?'overdue-mini':''}" style="margin-left:auto">${ic.clock}${esc(formatDeadline(t.deadline))}</span>`:''}</div>
      <h3>${esc(t.title)}</h3>
      <div class="card-meta">
        <div class="prog-mini"><i style="width:${p}%"></i></div>
        <span class="mini">${p}%</span>
      </div>
    </div>`;
  }).join("") : `<div class="empty">${activeFilter?'ไม่มีงานที่กำลังทำในโปรเจกต์นี้':'ยังไม่มีงานที่ดึงเข้ามาทำ'}</div>`;

  // done zone
  doneList.innerHTML = done.length ? done.map(t=>{
    const s = SRC[t.src];
    return `<div class="card done-card ${t.id===selectedId?'selected':''}" tabindex="0" onclick="select('${t.id}')" onkeydown="if(event.key==='Enter')select('${t.id}')">
      <div class="card-top"><span class="src ${s.cls}">${s.name}</span>${t.tag?`<span class="tag-pill">${esc(t.tag)}</span>`:''}</div>
      <h3>${esc(t.title)}</h3>
    </div>`;
  }).join("") : `<div class="empty">ยังไม่มีงานที่เสร็จ</div>`;

  renderDetail();
}
function setFilter(tg){ activeFilter = tg; render(); }

function renderDetail(){
  const el = document.getElementById("detail");
  if(!loaded){
    el.innerHTML = `<div class="detail-empty"><p>กำลังโหลด…</p></div>`;
    return;
  }
  const t = tasks.find(x=>x.id===selectedId && (x.state==="active" || x.state==="done"));
  if(!t){
    el.innerHTML = `<div class="detail-empty">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      <p>เลือกงานทางซ้ายเพื่อดูรายละเอียด<br>แล้วแตกเป็นขั้นตอนย่อย</p></div>`;
    return;
  }
  const s = SRC[t.src], p = progress(t);
  const C=2*Math.PI*24, off=C*(1-p/100);
  el.innerHTML = `<div class="detail-inner">
    <span class="src ${s.cls}">${s.name}</span>
    <h2>${esc(t.title)}</h2>

    ${t.state==="done" ? `<div class="donebanner">
      <span>✓ เสร็จสิ้นแล้ว</span>
      <button class="editbtn" onclick="reopenTask('${t.id}')">เปิดกลับมาแก้ไข</button>
    </div>` : ''}

    <div class="next" id="field-next">
      <div class="field-row"><span class="label">ขั้นตอนต่อไป — ทำได้เลย</span>
        <button class="editbtn" onclick="editField('${t.id}','next','ขั้นตอนต่อไป')">แก้ไข</button></div>
      <p>${esc(t.next||"ยังไม่ได้ตั้ง next action")}</p>
      <small>งานแรกเล็กๆ ที่ลงมือได้ทันที ไม่เกิน 15 นาที</small>
    </div>

    <div class="ring-row">
      <svg class="ring" viewBox="0 0 56 56">
        <circle cx="28" cy="28" r="24" fill="none" stroke="var(--line)" stroke-width="6"/>
        <circle cx="28" cy="28" r="24" fill="none" stroke="var(--green)" stroke-width="6" stroke-linecap="round"
          stroke-dasharray="${C}" stroke-dashoffset="${off}" transform="rotate(-90 28 28)"/>
        <text x="28" y="32" text-anchor="middle" font-family="IBM Plex Mono" font-size="13" fill="var(--ink)">${p}%</text>
      </svg>
      <div><b>${t.subs.filter(x=>x.done).length}/${t.subs.length}</b><span>ขั้นตอนที่เสร็จแล้ว</span></div>
    </div>

    <div class="sub-head"><span class="label">${ic.list ? '' : ''}ขั้นตอนย่อย</span></div>
    <div class="checklist">
      ${t.subs.map((sub,i)=>`
        <div class="chk ${sub.done?'done':''}" onclick="toggle('${t.id}',${i})">
          <span class="box">${ic.check}</span>
          <span class="txt">${esc(sub.t)}</span>
        </div>`).join("")}
    </div>
    <div class="addsub">
      <input id="subIn" type="text" placeholder="เพิ่มขั้นตอน…" onkeydown="if(event.key==='Enter')addSub('${t.id}')">
      <button onclick="addSub('${t.id}')">+</button>
    </div>

    <div class="meta-grid">
      <div class="meta-cell"><span class="label">โปรเจกต์</span><p>${esc(t.tag||"— งานเดี่ยว")}</p></div>
      <div class="meta-cell warn" id="field-deadline">
        <div class="field-row"><span class="label">เดดไลน์</span>
          <button class="editbtn" onclick="editField('${t.id}','deadline','เดดไลน์')">แก้ไข</button></div>
        <p class="${isOverdue(t.deadline)?'overdue':''}">${t.deadline?esc(formatDeadline(t.deadline)):"—"}</p>
      </div>
    </div>
    <div class="meta-grid" style="margin-top:10px">
      <div class="meta-cell" id="field-note" style="grid-column:1/-1">
        <div class="field-row"><span class="label">โน้ต</span>
          <button class="editbtn" onclick="editField('${t.id}','note','โน้ต')">แก้ไข</button></div>
        <p>${esc(t.note||"—")}</p>
      </div>
    </div>

    <div class="flowhint"><b>โฟลว์:</b> โยนเข้าตะกร้า → ดึงเข้าทำ → ตั้ง next action → ติ๊กทีละขั้น จนครบ 100%</div>
  </div>`;
}

/* ---------- ACTIONS (optimistic — อัปเดตหน้าจอก่อน แล้วค่อยยิงไป backend เงียบๆ) ---------- */
function capture(){
  const v = capIn.value.trim(); if(!v) return;
  const tag = capTag.value.trim(), src = capSrc.value;
  capIn.value=""; capTag.value="";
  tasks.unshift({id:"temp-"+Date.now(), src, tag, title:v, state:"inbox", next:"", deadline:"", note:"", subs:[]});
  render();
  postAction("create", {title:v, project_tag:tag, src});
}
function pullIn(id){
  const t = tasks.find(x=>x.id===id); if(!t) return;
  t.state = "active";
  selectedId = id;
  render();
  postAction("pullIn", {id});
}
function reopenTask(id){
  const t = tasks.find(x=>x.id===id); if(!t) return;
  t.state = "active";
  render();
  postAction("update", {id, state:"active"});
}
function select(id){ selectedId=id; render(); }
function toggle(id,i){
  const t = tasks.find(x=>x.id===id); if(!t || !t.subs[i]) return;
  t.subs[i].done = !t.subs[i].done;
  if(t.state !== "inbox"){
    const allDone = t.subs.length>0 && t.subs.every(s=>s.done);
    t.state = allDone ? "done" : "active";
  }
  render();
  postAction("toggleSubtask", {id, index:i});
}
function addSub(id){
  const inp=document.getElementById("subIn"); const v=inp.value.trim(); if(!v) return;
  const t = tasks.find(x=>x.id===id); if(!t) return;
  t.subs.push({t:v, done:false});
  if(t.state === "done") t.state = "active"; // เพิ่มขั้นตอนใหม่ที่ยังไม่เสร็จ -> กลับไปกำลังทำอัตโนมัติ
  render();
  const ni=document.getElementById("subIn"); if(ni) ni.focus();
  postAction("addSubtask", {id, text:v});
}

// แก้ next / เดดไลน์ / โน้ต แบบ inline — คลิก "แก้ไข" แล้วกรอกในช่องได้เลย
function editField(id, field, label){
  const t = tasks.find(x=>x.id===id); if(!t) return;
  const wrap = document.getElementById("field-"+field);
  const inputType = field === "deadline" ? "date" : "text";
  wrap.innerHTML = `<span class="label">${esc(label)}</span>
    <div class="editrow">
      <input id="editIn" type="${inputType}" value="${esc(inputType==='date' ? String(t[field]||"").slice(0,10) : (t[field]||""))}" onkeydown="if(event.key==='Enter')saveField('${id}','${field}')">
      <button onclick="saveField('${id}','${field}')">บันทึก</button>
    </div>`;
  const inp = document.getElementById("editIn");
  inp.focus();
  if(inputType === "date"){
    try{ inp.showPicker(); }catch(e){} // เด้งปฏิทินให้เลย (รองรับ Chrome/Edge; เบราว์เซอร์อื่นแค่ต้องคลิกช่องเอง ไม่ error)
  }
}
function saveField(id, field){
  const inp = document.getElementById("editIn"); if(!inp) return;
  const v = inp.value.trim();
  const t = tasks.find(x=>x.id===id); if(t) t[field] = v;
  render();
  const backendKey = field === "next" ? "next_action" : field;
  postAction("update", {id, [backendKey]: v});
}

function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}

loadTasks();
</script>
